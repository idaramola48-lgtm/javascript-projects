<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body {
        font-family: Arial, sans-serif;
        padding: 20px;
        background: #f5f5f5;
    }

    .product {
        display: inline-block;
        background: white;
        padding: 15px;
        margin: 10px;
        border-radius: 8px;
        width: 150px;
        text-align: center;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    .addbtn {
        background: #333;
        color: white;
        border: none;
        padding: 8px 15px;
        border-radius: 5px;
        cursor: pointer;
        margin-top: 8px;
    }

    .addbtn:hover {
        background: #555;
    }

    #cart {
        background: white;
        padding: 20px;
        margin-top: 20px;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    .removeBtn {
        background: red;
        color: white;
        border: none;
        padding: 4px 10px;
        border-radius: 4px;
        cursor: pointer;
        margin-left: 10px;
    }

    #id {
        color: #333;
        margin-top: 15px;
    }
</style>

<body>
    <div class="container">
        <div class="item-1">
            <h3>Rice</h3>
            <p class="price">25000naria</p>
            <button class="addbtn">Add to cart</button>
        </div>
        <div class="item-2">
            <h3>Noodles</h3>
            <p class="price">15000naria</p>
            <button class="addbtn">Add to cart</button>
        </div>
        <div class="item-3">
            <h3>Clothes</h3>
            <p class="price">8000naria</p>
            <button class="addbtn">Add to cart</button>
        </div>
        <div class="item-4">
            <h3>car</h3>
            <p class="price">125000naria</p>
            <button class="addbtn">Add to cart</button>
        </div>
        <div class="item-5">
            <h3>Headset</h3>
            <p class="price">25000naria</p>
            <button class="addbtn">Add to cart</button>
        </div>

        <h1 id="id">Total:</h1>
        <div id="cart"></div>
    </div>
    <script>
        let container = document.querySelectorAll('.addbtn');
        let realPrice = 0;
        container.forEach(function (eachbtn) {
            eachbtn.addEventListener("click", function () {
                let parent = eachbtn.parentElement;
                let productName = parent.querySelector("h3").innerHTML;
                let price = parseInt(parent.querySelector(".price").innerHTML);


                let priceUpdater = document.getElementById("id");
                realPrice += price;

                let cartItem = document.createElement("div");
                cartItem.innerHTML = `${productName} - ${price} <button class="removeBtn">Remove</button>`

                cartItem.querySelector('.removeBtn').addEventListener("click", function () {
                    cartItem.remove();
                    realPrice -= price;
                    priceUpdater.innerHTML = `Total: ${realPrice}naria`
                })
                priceUpdater.innerHTML = `Total: ${realPrice}naria`


                document.getElementById("cart").appendChild(cartItem);
                console.log(realPrice)

            })
        })
    </script>
</body>

</html>
