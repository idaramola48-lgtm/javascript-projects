<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    #container {
        height: 60px;
        width: 60px;
        border: 1px solid black;
        border-radius: 50%;
        margin: auto;
    }

    .box {
        width: 70%;
        height: 600px;
        border: 1px solid black;
        margin: auto;
        text-align: center;
        vertical-align: middle;
        justify-content: center;
    }

    button {
        margin-top: 20px;
        width: 80px;
        height: 40px;
        border: none;
        background-color: blue;
        color: white;
    }
</style>

<body>
    <div class="box">
        <h2>Traffic-light</h2>
        <div id="container" style="background-color: none;">

        </div>
        <button id="btn" onclick="change()">Next</button>
    </div>
</body>
<script>
    function change() {

        var Input = document.getElementById("container");

        
        if (Input.style.backgroundColor === "" || Input.style.backgroundColor === "green"){
            Input.style.backgroundColor = "red";
        }else if(Input.style.backgroundColor === "red"){
            Input.style.backgroundColor = "yellow";
        }else if(Input.style.backgroundColor === "yellow"){
            Input.style.backgroundColor = "green";
        }
  
    }
</script>

</html>
