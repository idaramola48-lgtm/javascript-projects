<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div class="pass">Israel — 85</div>
    <div class="fail">Amara — 42</div>
    <div class="pass">Chidi — 67</div>
    <div class="fail">Tunde — 30</div>
    <button id="colorBtn">Color Them</button>


    <script>
        let changeBtn = document.getElementById("colorBtn");

        changeBtn.onclick = function () {
            let generalContainer = document.querySelectorAll(".pass, .fail");

            generalContainer.forEach(function(container){
                if(container.classList.contains("pass")){
                    container.style.backgroundColor = "green";
                }else{
                    container.style.backgroundColor = "red";
                }
            })
        }
    </script>
</body>

</html>
