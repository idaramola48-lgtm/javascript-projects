<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h2>Class Grade Book</h2>

    <div class="student">
        <h3>Israel</h3>
        <p class="subject">Math: 78</p>
        <p class="subject">English: 55</p>
        <p class="subject">Physics: 40</p>
    </div>

    <div class="student">
        <h3>Amara</h3>
        <p class="subject">Math: 90</p>
        <p class="subject">English: 85</p>
        <p class="subject">Physics: 92</p>
    </div>

    <div class="student">
        <h3>Chidi</h3>
        <p class="subject">Math: 30</p>
        <p class="subject">English: 45</p>
        <p class="subject">Physics: 28</p>
    </div>

    <button id="gradeBtn">Check Grades</button>
    <button id="resetBtn">Reset</button>



    <script>
        let gradeBtn = document.getElementById("gradeBtn");

        gradeBtn.onclick = function () {

            let students = document.querySelectorAll('.student');

            students.forEach(function (card) {
                let subjects = card.querySelectorAll(".subject");

                let total = 0;
                subjects.forEach(function (subject) {
                    let text = subject.innerHTML;
                    let score = parseInt(text.split(": ")[1]);
                    total += score;
                });

                let average = total / subjects.length;

                if (average >= 60) {
                    card.style.backgroundColor = "green";
                    card.innerHTML += `<p>Average : ${average}-PASS</p>`
                } else {
                    card.style.backgroundColor = "red";
                    card.innerHTML += `<p>Average : ${average}-FAIL</p>`
                }
            });
            // console.log(student)
        }

        let resetBtn = document.getElementById("resetBtn");

        resetBtn.onclick = function () {
            let students = document.querySelectorAll('.student');

            students.forEach(function (card) {

                let subjects = card.querySelectorAll(".subject");

                let total = 0;
                subjects.forEach(function (subject) {
                    let text = subject.innerHTML;
                    let score = parseInt(text.split(": ")[1]);
                    total += score;
                })
                let average = total / subjects.length;

                card.style.backgroundColor = "";

            })
        }
    </script>
</body>

</html>
