<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <!-- 3 student cards -->
    <div class="student" id="s1">
        <h3>Israel Eze</h3>
        <p>Course: Computer Science</p>
        <p>Score: 85</p>
    </div>

    <div class="student" id="s2">
        <h3>Amara Obi</h3>
        <p>Course: Cybersecurity</p>
        <p>Score: 42</p>
    </div>

    <div class="student" id="s3">
        <h3>Chidi Nwoke</h3>
        <p>Course: Engineering</p>
        <p>Score: 67</p>
    </div>

    <button id="gradeBtn">Show Pass/Fail</button>
    <button id="resetBtn">Reset</button>


    <script>
        let btn = document.getElementById("gradeBtn");

        btn.onclick = function () {
            let generalContainer = document.querySelectorAll('.student');
            let scoreText = document.querySelector('p:last-child').innerHTML;
            let score = parseInt(scoreText.replace("Score", ""))


            generalContainer.forEach(function (card) {
                let scoreText = card.querySelector('p:last-child').innerHTML;

                let score = parseInt(scoreText.replace("Score", ""))
                if (score >= 50) {
                    card.style.background = "green";

                } else {
                    card.style.background = "red"
                }
            })


            console.log(score);
        }

        let resetBtn = document.getElementById("resetBtn");

        resetBtn.onclick = function () {
            let generalContainer = document.querySelectorAll('.student');
            generalContainer.forEach(function(card){
                card.style.background = '';
            })
        }
    </script>
</body>

</html>
