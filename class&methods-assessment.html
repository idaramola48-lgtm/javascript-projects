<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        class phone {
            constructor(brand, model, price) {
                this.brand = brand,
                    this.model = model,
                    this.price = price

            }

            describe() {
                return `${this.brand} ${this.model} is ${this.price} naria`;
            }
        }

        class smartPhone extends phone {
            constructor(brand, model, price, camera) {
                super(brand, model, price)
                this.camera = camera;
            }

            cameraInfo() {
                return `${this.brand} ${this.model} has a ${this.camera} camera.`
            }

            describe() {
                return `SMARTPHONE : ${this.brand} ${this.model} - ${this.price}`
            }

            isExpensive(budget){
                this.price > budget
            }
        }

        const arr = []

        let sPhone1 = new smartPhone("samsung", "S24 Ultra", 1000000, "200MP");
        let sPhone2 = new smartPhone("iphone", "13 Pro", 600000, "170MP");
        let sPhone3 = new smartPhone("Techno", "Spark 20", 350000, "150MP");


        let smart1 = sPhone1.describe();
        let smart2 = sPhone2.describe();
        let smart3 = sPhone3.describe();

        arr.push(smart1);
        arr.push(smart2);
        arr.push(sPhone3);
        
        console.log(arr);

        for(let i = 0 ; i < arr.length ; i++){
            console.log(arr[i])
        }

    </script>
</body>

</html>
